<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Statistics</title><style>:root{color-scheme:light;font-family:Inter,ui-sans-serif,system-ui,sans-serif;line-height:1.5;}*{box-sizing:border-box;}body{margin:0;background:#f5f1e8;color:#111827;}a{color:inherit;text-decoration:none;}img{display:block;max-width:100%;}.ak-statistics{padding:3rem 1.5rem;background:#111827;color:#f9fafb;text-align:center}.ak-statistics__wrap{max-width:60rem;margin:0 auto}.ak-statistics__title{margin:0;font-size:.95rem;letter-spacing:.28em;text-transform:uppercase;color:#cbd5e1}.ak-statistics__items{display:grid;grid-template-columns:repeat(auto-fit,minmax(10rem,1fr));gap:1rem;list-style:none;padding:0;margin:2rem 0 0}.ak-statistics__item{padding:1.25rem;border-radius:1rem;background:rgba(255,255,255,.08)}.ak-statistics__value{display:block;font-size:2rem;font-weight:700}.ak-statistics__label{display:block;margin-top:.35rem;color:#cbd5e1}</style></head><body><section class="ak-statistics"><div class="ak-statistics__wrap"><h2 class="ak-statistics__title">Export metrics</h2><ul class="ak-statistics__items"><li class="ak-statistics__item"><span class="ak-statistics__value">31</span><span class="ak-statistics__label">existing tests</span></li><li class="ak-statistics__item"><span class="ak-statistics__value">9</span><span class="ak-statistics__label">fixture modules</span></li><li class="ak-statistics__item"><span class="ak-statistics__value">1</span><span class="ak-statistics__label">alt warning added</span></li></ul></div></section></body></html>
