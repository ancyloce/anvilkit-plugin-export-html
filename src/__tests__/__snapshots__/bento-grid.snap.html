<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Bento Grid</title><style>:root{color-scheme:light;font-family:Inter,ui-sans-serif,system-ui,sans-serif;line-height:1.5;}*{box-sizing:border-box;}body{margin:0;background:#f5f1e8;color:#111827;}a{color:inherit;text-decoration:none;}img{display:block;max-width:100%;}.ak-bento-grid{padding:2rem 1.5rem;background:#111827;color:#f9fafb}.ak-bento-grid__grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(16rem,1fr));gap:1rem;max-width:72rem;margin:0 auto}.ak-bento-grid__card{padding:1.5rem;border-radius:1.25rem;background:rgba(255,255,255,.08)}.ak-bento-grid__icon{width:2.5rem;height:2.5rem;display:grid;place-items:center;border-radius:999px;background:#f59e0b;color:#111827;font-weight:700}.ak-bento-grid__cta{display:inline-flex;margin-top:1rem;color:#fbbf24;font-weight:600}</style></head><body><section class="ak-bento-grid" data-theme="light" data-platform="web"><div class="ak-bento-grid__grid"><article class="ak-bento-grid__card" data-size="wide"><div class="ak-bento-grid__icon">S</div><h2>Snapshots</h2><p>Lock output to a stable HTML baseline.</p><button class="ak-bento-grid__cta" type="button" disabled>Learn more</button></article><article class="ak-bento-grid__card" data-size="default"><div class="ak-bento-grid__icon">L</div><h2>Linting</h2><p>Keep fixture modules clean and deterministic.</p><button class="ak-bento-grid__cta" type="button" disabled>Learn more</button></article></div></section></body></html>
