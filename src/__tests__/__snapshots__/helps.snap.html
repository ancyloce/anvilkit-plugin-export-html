<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Helps</title><style>:root{color-scheme:light;font-family:Inter,ui-sans-serif,system-ui,sans-serif;line-height:1.5;}*{box-sizing:border-box;}body{margin:0;background:#f5f1e8;color:#111827;}a{color:inherit;text-decoration:none;}img{display:block;max-width:100%;}.ak-helps{padding:3rem 1.5rem;background:radial-gradient(circle at top,#ecfccb,#ffffff 55%)}.ak-helps__wrap{max-width:56rem;margin:0 auto;text-align:center}.ak-helps__message{margin:0 auto;max-width:42rem;font-size:1.1rem;white-space:pre-line}.ak-helps__avatars{display:flex;justify-content:center;gap:.75rem;flex-wrap:wrap;list-style:none;padding:0;margin:1.5rem 0}.ak-helps__avatar,.ak-helps__fallback{width:3rem;height:3rem;border-radius:999px;border:2px solid #fff;box-shadow:0 6px 18px rgba(0,0,0,.12)}.ak-helps__fallback{display:grid;place-items:center;background:#111827;color:#fff;font-weight:700}.ak-helps__button{display:inline-flex;padding:.8rem 1.2rem;border-radius:999px;background:#111827;color:#fff;font-weight:600}</style></head><body><section class="ak-helps"><div class="ak-helps__wrap"><p class="ak-helps__message">The export team is online and ready to help.</p><ul class="ak-helps__avatars"><li title="Rae Chen"><span class="ak-helps__fallback">RC</span></li><li title="Jon Patel"><span class="ak-helps__fallback">JP</span></li></ul><a class="ak-helps__button" href="https://example.com/support">Contact support</a></div></section></body></html>
