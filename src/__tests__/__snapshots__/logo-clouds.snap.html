<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Logo Clouds</title><style>:root{color-scheme:light;font-family:Inter,ui-sans-serif,system-ui,sans-serif;line-height:1.5;}*{box-sizing:border-box;}body{margin:0;background:#f5f1e8;color:#111827;}a{color:inherit;text-decoration:none;}img{display:block;max-width:100%;}.ak-logo-clouds{padding:4rem 1.5rem;text-align:center;background:#fff}.ak-logo-clouds__wrap{max-width:72rem;margin:0 auto}.ak-logo-clouds__title{margin:0;font-size:clamp(2.2rem,6vw,4.2rem)}.ak-logo-clouds__subtitle{margin:1rem auto 0;max-width:40rem;color:#6b7280}.ak-logo-clouds__list{display:grid;grid-template-columns:repeat(auto-fit,minmax(8rem,1fr));gap:1rem;list-style:none;padding:0;margin:2rem 0 0}.ak-logo-clouds__item{display:grid;place-items:center;min-height:5rem;padding:1rem;border:1px solid #e5e7eb;border-radius:1rem;background:#fafaf9}</style></head><body><section class="ak-logo-clouds"><div class="ak-logo-clouds__wrap"><h2 class="ak-logo-clouds__title">Used by release teams</h2><p class="ak-logo-clouds__subtitle">Stable fixture coverage for every supported marketing block.</p><ul class="ak-logo-clouds__list" aria-label="Brand logos"><li class="ak-logo-clouds__item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/react/react-original.svg" alt="React logo" loading="lazy" decoding="async"></li><li class="ak-logo-clouds__item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/tailwindcss/tailwindcss-original.svg" alt="Tailwind CSS logo" loading="lazy" decoding="async"></li><li class="ak-logo-clouds__item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/docker/docker-original.svg" alt="Docker logo" loading="lazy" decoding="async"></li><li class="ak-logo-clouds__item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/nodejs/nodejs-original.svg" alt="Node.js logo" loading="lazy" decoding="async"></li><li class="ak-logo-clouds__item"><img src="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/icons/graphql/graphql-plain.svg" alt="GraphQL logo" loading="lazy" decoding="async"></li></ul></div></section></body></html>
