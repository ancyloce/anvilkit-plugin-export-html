<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Hero</title><style>:root{color-scheme:light;font-family:Inter,ui-sans-serif,system-ui,sans-serif;line-height:1.5;}*{box-sizing:border-box;}body{margin:0;background:#f5f1e8;color:#111827;}a{color:inherit;text-decoration:none;}img{display:block;max-width:100%;}.ak-hero{padding:5rem 1.5rem;background:linear-gradient(180deg,#fff7ed,#f8fafc)}.ak-hero__wrap{max-width:70rem;margin:0 auto;text-align:center}.ak-hero__eyebrow,.ak-hero__button{display:inline-flex;padding:.7rem 1.1rem;border-radius:999px;border:1px solid #d6d3d1;background:#fff;font-weight:600}.ak-hero__headline{margin:1.5rem 0 0;font-size:clamp(2.5rem,7vw,5.5rem);line-height:.95;white-space:pre-line}.ak-hero__description{margin:1rem auto 0;max-width:46rem;font-size:1.15rem;color:#4b5563;white-space:pre-line}.ak-hero__actions{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:2rem}.ak-hero__button--primary{background:#111827;color:#fff;border-color:#111827}</style></head><body><section class="ak-hero"><div class="ak-hero__wrap"><h1 class="ak-hero__headline">Ship updates without friction.</h1><p class="ak-hero__description">Deterministic HTML exports for internal release pages.</p><div class="ak-hero__actions"><a class="ak-hero__button" href="https://example.com/linux">Download for Linux</a></div></div></section></body></html>
