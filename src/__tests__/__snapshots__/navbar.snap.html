<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Navbar</title><style>:root{color-scheme:light;font-family:Inter,ui-sans-serif,system-ui,sans-serif;line-height:1.5;}*{box-sizing:border-box;}body{margin:0;background:#f5f1e8;color:#111827;}a{color:inherit;text-decoration:none;}img{display:block;max-width:100%;}.ak-navbar{padding:1rem 1.5rem;background:#fff;border-bottom:1px solid #e5e7eb}.ak-navbar__wrap{max-width:72rem;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}.ak-navbar__brand{font-weight:700;font-size:1.05rem}.ak-navbar__menu,.ak-navbar__actions{display:flex;gap:1rem;align-items:center;list-style:none;padding:0;margin:0}.ak-navbar__menu a[aria-current='page']{text-decoration:underline;text-underline-offset:.3em}.ak-navbar__action{display:inline-flex;padding:.65rem 1rem;border-radius:999px;border:1px solid #d1d5db;background:#fff}.ak-navbar__action[data-variant='default']{background:#111827;border-color:#111827;color:#fff}</style></head><body><nav class="ak-navbar" aria-label="Primary"><div class="ak-navbar__wrap"><a class="ak-navbar__brand" href="https://example.com/home">Anvilkit</a><ul class="ak-navbar__menu"><li><a aria-current="page" href="https://example.com/docs">Docs</a></li><li><a href="https://example.com/pricing">Pricing</a></li></ul><div class="ak-navbar__actions"><a class="ak-navbar__action" data-variant="primary" href="https://example.com/start">Start trial</a></div></div></nav></body></html>
